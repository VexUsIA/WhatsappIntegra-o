<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOM — Painel WhatsApp</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #00c853;
            --accent-hover: #00a846;
            --bg: #0d0d0d;
            --surface: #141414;
            --surface-2: #1a1a1a;
            --border: #222;
            --border-hover: #2e2e2e;
            --text: #e4e4e4;
            --text-muted: #666;
            --danger: #e05252;
            --danger-bg: rgba(224,82,82,0.08);
            --danger-border: rgba(224,82,82,0.25);
            --warn: #d4a017;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── LOGIN ── */
        .login-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
        }

        .login-box .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-box .brand span {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .login-box .brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text);
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-primary {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .alert-error {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger-border);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }

        /* ── LAYOUT ── */
        .app { display: none; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .topbar-brand {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        .topbar-store {
            font-size: 12px;
            color: var(--text-muted);
            padding-left: 20px;
            border-left: 1px solid var(--border);
        }

        .btn-ghost {
            padding: 7px 14px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--border-hover);
        }

        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 28px;
        }

        /* ── STATS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 20px;
        }

        .stat-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        /* ── SECTION ── */
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .section-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .section-body { padding: 16px 20px; }

        /* ── CONNECTIONS ── */
        .conn-card {
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 16px 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            transition: border-color 0.15s;
        }

        .conn-card:last-child { margin-bottom: 0; }
        .conn-card:hover { border-color: var(--border-hover); }

        .conn-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 3px;
        }

        .conn-phone {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-connected    { background: rgba(0,200,83,0.12); color: var(--accent); border: 1px solid rgba(0,200,83,0.25); }
        .badge-disconnected { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
        .badge-qrpending    { background: rgba(212,160,23,0.1); color: var(--warn); border: 1px solid rgba(212,160,23,0.25); }

        .conn-actions { display: flex; gap: 8px; }

        .btn-sm {
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }

        .btn-sm-accent { background: var(--accent); color: #000; }
        .btn-sm-accent:hover { background: var(--accent-hover); }

        .btn-sm-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger-border);
        }
        .btn-sm-danger:hover { background: var(--danger-bg); }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px;
            width: 90%;
            max-width: 440px;
        }

        .modal-box h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 22px;
            color: var(--text);
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }

        /* ── QR ── */
        .qr-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .qr-box h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .qr-box .qr-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 22px;
            line-height: 1.6;
        }

        .qr-area {
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .qr-area img {
            width: 260px;
            height: 260px;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            background: #fff;
        }

        .qr-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .qr-success {
            color: var(--accent);
            font-size: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
    <div class="login-box">
        <div class="brand">
            <span>SCOM ERP</span>
            <h1>Painel WhatsApp</h1>
        </div>
        <div class="alert-error" id="loginError"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
    </div>
</div>

<!-- APP -->
<div class="app" id="app">
    <div class="topbar">
        <div class="topbar-left">
            <span class="topbar-brand">SCOM WhatsApp</span>
            <span class="topbar-store" id="topbarStore"></span>
        </div>
        <button class="btn-ghost" onclick="logout()">Sair</button>
    </div>

    <div class="content">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="section">
            <div class="section-header">
                <h2>Conexoes WhatsApp</h2>
                <button class="btn-sm btn-sm-accent" onclick="showAddModal()">Nova Conexao</button>
            </div>
            <div class="section-body">
                <div id="connList"></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: Nova Conexao -->
<div class="modal-overlay" id="addModal">
    <div class="modal-box">
        <h2>Nova Conexao WhatsApp</h2>
        <form id="addConnForm">
            <div class="form-group">
                <label>Nome da Conexao</label>
                <input type="text" id="connName" placeholder="Ex: Vendas, Suporte" required>
            </div>
            <div class="form-group">
                <label>Numero WhatsApp</label>
                <input type="text" id="connPhone" placeholder="5511999999999" required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn-primary">Criar Conexao</button>
                <button type="button" class="btn-ghost" style="width:100%;text-align:center" onclick="closeAddModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL: QR Code -->
<div class="modal-overlay" id="qrModal">
    <div class="qr-box">
        <h2>Conectar WhatsApp</h2>
        <p class="qr-hint">Abra o WhatsApp no celular &rarr; Dispositivos conectados &rarr; Conectar dispositivo</p>
        <div class="qr-area" id="qrArea">
            <div class="qr-loading">
                <div class="spinner"></div>
                <span>Gerando QR Code...</span>
            </div>
        </div>
        <button class="btn-ghost" style="width:100%;text-align:center" onclick="closeQrModal()">Fechar</button>
    </div>
</div>

<script>
    const API = window.location.origin;
    let token = localStorage.getItem('token');
    let dashInterval, qrInterval;

    // ── AUTH ──
    document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const res  = await fetch(`${API}/api/panel/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                token = data.token;
                localStorage.setItem('token', token);
                localStorage.setItem('store', JSON.stringify(data.store));
                showApp();
            } else {
                showLoginError(data.error || 'Credenciais invalidas');
            }
        } catch {
            showLoginError('Erro ao conectar ao servidor');
        }
    });

    function showLoginError(msg) {
        const el = document.getElementById('loginError');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function logout() {
        localStorage.clear();
        clearInterval(dashInterval);
        location.reload();
    }

    // ── APP ──
    function showApp() {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        const store = JSON.parse(localStorage.getItem('store'));
        document.getElementById('topbarStore').textContent = `${store.storeName} (${store.storeCode})`;
        loadDashboard();
        dashInterval = setInterval(loadDashboard, 5000);
    }

    async function loadDashboard() {
        try {
            const res  = await fetch(`${API}/api/panel/dashboard`, { headers: { Authorization: `Bearer ${token}` } });
            const data = await res.json();
            renderStats(data.stats, data.connections);
            renderConnections(data.connections);
        } catch {}
    }

    function renderStats(stats, connections) {
        const sent       = stats.find(s => s.status === 'sent')?._count       || 0;
        const pending    = stats.find(s => s.status === 'pending')?._count    || 0;
        const failed     = stats.find(s => s.status === 'failed')?._count     || 0;
        const connected  = connections.filter(c => c.status === 'connected').length;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="label">Conexoes Ativas</div><div class="value">${connected}</div></div>
            <div class="stat-card"><div class="label">Mensagens Enviadas</div><div class="value">${sent}</div></div>
            <div class="stat-card"><div class="label">Pendentes</div><div class="value">${pending}</div></div>
            <div class="stat-card"><div class="label">Falhas</div><div class="value">${failed}</div></div>
        `;
    }

    function renderConnections(connections) {
        if (!connections.length) {
            document.getElementById('connList').innerHTML = '<div class="empty-state">Nenhuma conexao cadastrada</div>';
            return;
        }
        const statusMap = { connected: ['connected', 'Conectado'], disconnected: ['disconnected', 'Desconectado'], qr_pending: ['qrpending', 'Aguardando QR Code'] };
        document.getElementById('connList').innerHTML = connections.map(c => {
            const [cls, label] = statusMap[c.status] || ['disconnected', 'Desconectado'];
            const qrBtn   = c.status !== 'connected' ? `<button class="btn-sm btn-sm-accent" onclick="openQr('${c.id}')">Conectar via QR Code</button>` : '';
            const discBtn = c.status === 'connected'  ? `<button class="btn-sm btn-sm-danger" onclick="disconnect('${c.id}')">Desconectar</button>` : '';
            const delBtn  = `<button class="btn-sm btn-sm-danger" onclick="deleteConn('${c.id}')">Excluir</button>`;
            const action  = `${qrBtn}${discBtn}${delBtn}`;
            return `
                <div class="conn-card">
                    <div>
                        <div class="conn-name">${c.connectionName}</div>
                        <div class="conn-phone">${c.phoneNumber}</div>
                        <span class="badge badge-${cls}">${label}</span>
                    </div>
                    <div class="conn-actions">${action}</div>
                </div>`;
        }).join('');
    }

    // ── CONNECTIONS ──
    function showAddModal()  { document.getElementById('addModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

    document.getElementById('addConnForm').addEventListener('submit', async e => {
        e.preventDefault();
        const connectionName = document.getElementById('connName').value;
        const phoneNumber    = document.getElementById('connPhone').value;
        try {
            const res  = await fetch(`${API}/api/panel/connections`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                body: JSON.stringify({ connectionName, phoneNumber })
            });
            const data = await res.json();
            if (data.success) { closeAddModal(); loadDashboard(); }
            else alert(data.error);
        } catch { alert('Erro ao criar conexao'); }
    });

    async function disconnect(id) {
        if (!confirm('Deseja desconectar esta conexao?')) return;
        await fetch(`${API}/api/panel/connections/${id}/disconnect`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
        loadDashboard();
    }

    async function deleteConn(id) {
        if (!confirm('Excluir esta conexao permanentemente?')) return;
        await fetch(`${API}/api/panel/connections/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
        loadDashboard();
    }

    // ── QR ──
    async function openQr(id) {
        document.getElementById('qrModal').style.display = 'flex';
        document.getElementById('qrArea').innerHTML = `<div class="qr-loading"><div class="spinner"></div><span>Gerando QR Code...</span></div>`;

        await fetch(`${API}/api/panel/connections/${id}/reconnect`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } });

        let elapsed = 0;
        qrInterval = setInterval(async () => {
            elapsed += 2000;
            if (elapsed > 60000) {
                clearInterval(qrInterval);
                document.getElementById('qrArea').innerHTML = `<div style="color:var(--danger);font-size:13px">Tempo esgotado. Feche e tente novamente.</div>`;
                return;
            }
            try {
                const res  = await fetch(`${API}/api/panel/connections/${id}/status`, { headers: { Authorization: `Bearer ${token}` } });
                const data = await res.json();
                if (data.status === 'connected') {
                    clearInterval(qrInterval);
                    document.getElementById('qrArea').innerHTML = `<div class="qr-success">Conectado com sucesso</div>`;
                    setTimeout(() => { closeQrModal(); loadDashboard(); }, 2000);
                } else if (data.qrCode) {
                    document.getElementById('qrArea').innerHTML = `<img src="${data.qrCode}" alt="QR Code">`;
                }
            } catch {}
        }, 2000);
    }

    function closeQrModal() {
        clearInterval(qrInterval);
        document.getElementById('qrModal').style.display = 'none';
        loadDashboard();
    }

    if (token) showApp();
</script>
</body>
</html>
